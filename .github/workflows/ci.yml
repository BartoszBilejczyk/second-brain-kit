name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check Python syntax
        run: python -m py_compile tools/*.py setup/setup.py

      - name: Check skill frontmatter
        run: |
          python - <<'EOF'
          import pathlib, sys
          errors = []
          skills_path = pathlib.Path("plugins/second-brain/skills")
          for skill in skills_path.glob("*/SKILL.md"):
              content = skill.read_text()
              if not content.startswith("---"):
                  errors.append(f"{skill}: missing frontmatter opening ---")
              if "name:" not in content:
                  errors.append(f"{skill}: missing 'name:' in frontmatter")
              if "description:" not in content:
                  errors.append(f"{skill}: missing 'description:' in frontmatter")
          if errors:
              print("
".join(errors))
              sys.exit(1)
          print(f"All {len(list(skills_path.glob('*/SKILL.md')))} skills have valid frontmatter")
          EOF

      - name: Check .agents/ symlinks exist
        run: |
          count=$(ls -A .agents/skills/ | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            echo "ERROR: .agents/skills/ is empty — symlinks missing"
            exit 1
          fi
          echo "All $count .agents/ symlinks present (resolution skipped in CI)"
